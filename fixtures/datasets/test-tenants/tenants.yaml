# ============================================================
# Test and Real Tenants
# ============================================================
# Spec references: R-0068 (PA-010 through PA-016, Seed Data).
#
# Optional seed data. These tenants are registered in
# ledgius_platform but their databases are NOT auto-created.
# Each approved tenant needs:
#   1. A PostgreSQL database named after the slug (e.g. test-farm)
#   2. Flyway migrations applied to that database
#   3. A data volume directory at /data/{slug}/ (tenants/{slug}/ locally)
# Use the provisioning pipeline or manual creation for these.
#
# Run:  make seed-load DATASET=test-tenants

