# ============================================================
# Expense Items
# ============================================================
# Each expense generates a bill (accounts payable) from the
# named vendor. Amounts are net (ex-GST).
#
# Fields:
#   description     — appears on the bill line item
#   vendor          — must match a "code" from vendors.yaml
#   min_amount      — lowest amount for this expense (AUD)
#   max_amount      — highest amount (randomised between min/max)
#   frequency_days  — how often this expense recurs (0 = one-off)
#   account         — chart of accounts code for the expense
#
# Common accounts:
#   5010 = Purchases (cost of goods/supplies)
#   6110 = Advertising & Promotion
#   6180 = Office Supplies (cleaning, consumables)

expenses:

