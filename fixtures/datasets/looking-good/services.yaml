# ============================================================
# Service Catalogue
# ============================================================
# Each service is offered to customers and generates a sales
# invoice. Prices are net (ex-GST) — GST is added automatically.
#
# Fields:
#   name       — appears on the invoice line item
#   category   — grouping (massage, nails) for your reference
#   min_price  — lowest price charged for this service (AUD)
#   max_price  — highest price charged (randomised between min/max)
#   min_mins   — shortest appointment duration
#   max_mins   — longest appointment duration
#
# The revenue account used is "4020" (Services Revenue).
# To change this, edit the accounts section in config.yaml.

services:

  # ── Massage Services ──
  # Delivered from the mobile cabin on the tandem trailer.
  # Great for events, corporate wellness, and home visits.

  - name: "Relaxation Massage 60min"
    category: massage
    min_price: 75
    max_price: 95
    min_mins: 60
    max_mins: 60

  - name: "Deep Tissue Massage 60min"
    category: massage
    min_price: 85
    max_price: 105
    min_mins: 60
    max_mins: 60

  - name: "Deep Tissue Massage 90min"
    category: massage
    min_price: 110
    max_price: 135
    min_mins: 90
    max_mins: 90

  - name: "Hot Stone Massage 90min"
    category: massage
    min_price: 120
    max_price: 135
    min_mins: 90
    max_mins: 90

  - name: "Remedial Massage 120min"
    category: massage
    min_price: 125
    max_price: 135
    min_mins: 120
    max_mins: 120

  - name: "Swedish Massage 60min"
    category: massage
    min_price: 75
    max_price: 90
    min_mins: 60
    max_mins: 60

  # ── Nail Technician Services ──

  - name: "Express Manicure"
