# ── Gift Vouchers ──
# These are sold separately and invoiced as "Gift Voucher".
# They use the same revenue account as services.

gift_vouchers:
  # How often a voucher is sold (every N days, approximately)
  frequency_days: 6
  # Chance of a voucher being sold on an eligible day (0.85 = 85%)
  chance: 0.85
  # Available voucher denominations (one is chosen at random)
  amounts: [75, 80, 90, 100, 120]
